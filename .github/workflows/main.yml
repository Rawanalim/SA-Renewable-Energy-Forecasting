name: MLOps Renewable Energy CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions: 
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Fetch the latest code from the GitHub repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Set up the Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Install required libraries including openpyxl for Excel files
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install pandas numpy scikit-learn matplotlib openpyxl
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Run linting tests to check for code style issues
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    # Automatically verify that all team script files are present and syntactically correct
    - name: Run Main Pipeline
      run: |
        python main.py

    # Log the validation success and system deployment readiness
    - name: Deployment Readiness Report
      run: |
        echo "CI/CD Pipeline executed successfully! The main.py script runs flawlessly and the model is fully operational."

    # Verify the Streamlit dashboard compiles cleanly without breaks
    - name: Verify Dashboard Application Compilation
      run: |
        python -m py_compile app.py
