name: MLOps Renewable Energy CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Fetch the latest code from the GitHub repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Set up the Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Install required libraries including openpyxl for Excel files
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn matplotlib openpyxl

    # 4. Automatically verify that all team script files are present and syntactically correct
    - name: Run Main Pipeline
      run: |
        python main.py

    # 5. Log the validation success and system deployment readiness
    - name: Deployment Readiness Report
      run: |
        echo "CI/CD Pipeline executed successfully! The main.py script runs flawlessly and the model is fully operational."
